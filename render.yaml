services:
  - type: web
    name: world-of-dc-ui
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --port 10000 --host
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
